name: Create Pull Request to Main

on:
  push:
    branches:
      - develop

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current time
        id: date
        run: echo "datetime=$(date +'%Y/%m/%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          head: develop
          title: "Develop -> Main"
          body: |
            ## 概要
            developブランチの内容をmainへ反映します。

            **生成日時:** ${{ steps.date.outputs.datetime }}

            ---
            このPRはGitHub Actionsによって自動生成されました。
            内容を確認の上、マージしてください。
          labels: |
            automated pr
            maintenance
