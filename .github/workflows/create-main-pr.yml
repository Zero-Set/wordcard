name: Create Pull Request to Main

on:
  pull_request:
    branches:
      - develop
    types: [closed] # PRが閉じられた時

jobs:
  create-pr:
    if: github.event.pull_request.merged == true # かつ、マージされた場合のみ
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request to Main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. すでにPRが存在するか確認
          PR_EXISTS=$(gh pr list --base main --head develop --json number --jq '.[0].number')

          if [ -n "$PR_EXISTS" ]; then
            echo "PR already exists: #$PR_EXISTS. Skipping."
          else
            # 2. develop -> main のPRを直接作成
            gh pr create \
              --base main \
              --head develop \
              --title "Develop -> Main" \
              --body "developブランチの内容をmainへ反映します。 (Generated by GitHub Actions)"
          fi
