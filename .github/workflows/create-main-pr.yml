name: Create Pull Request to Main

on:
  pull_request:
    branches:
      - develop
    types: [closed] # PRが閉じられた時

jobs:
  create-pr:
    if: github.event.pull_request.merged == true # かつ、マージされた場合のみ
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ← ここに挿入します。0を指定することで全履歴を取得します。
      - name: Get current time
        id: date
        run: echo "datetime=$(date +'%Y/%m/%d %H:%M:%S')" >> $GITHUB_OUTPUT
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          # ↓ ここが最重要：headでは  なく「branch」を指定し、
          # かつ「develop」の内容をベースにすることを明示します
          branch: sync-develop-to-main
          head: develop
          # ↓ 差分がなくても空のコミットを作って強制的にPRを出す設定
          commit-message: "Sync develop to main at ${{ steps.date.outputs.datetime }}"
          title: "Develop -> Main"
          body: |
            ## 概要
            developブランチの内容をmainへ反映します。
            生成日時: ${{ steps.date.outputs.datetime }}
          labels: |
            automated pr
