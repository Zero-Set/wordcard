<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>単語帳</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="setup-view">
        <h2>単語帳</h2>
        <label class="file-label">
          CSVファイルを選択
          <input
            type="file"
            id="file-input"
            accept=".csv,.txt"
            style="display: none"
          />
        </label>
        <button class="btn full btn-secondary" onclick="resetAllHistory()">
          記録をリセット
        </button>
      </div>

      <div id="study-view" class="hidden">
        <div id="status-container">
          <span id="mic-status" class="mic-off">🎤 Mic Off</span>
        </div>
        <div id="live-score-container">
          <span id="current-idx">0</span>/<span id="total-count">0</span> |
          正解: <span id="live-score">0</span>
        </div>
        <div id="swipe-wrapper">
          <div class="card" id="card">
            <div id="history-info" class="history-badge"></div>
            <div id="word-display"></div>
            <div id="instruction">タップで回答を表示</div>
          </div>
        </div>
      </div>
      <!-- 結果発表画面-->
      <div id="result-view" class="hidden">
        <h2>結果発表</h2>
        <p class="final-score-text"><span id="final-score">0</span>%</p>
        <p id="final-stats"></p>

        <button
          id="retry-mistakes-btn"
          class="btn full"
          style="background: #ff6b6b; margin-top: 10px"
        >
          今回のミスを解き直す
        </button>

        <button class="btn full" onclick="location.reload()">
          最初から（全件ロード）
        </button>
      </div>
    </div>

    <script src="assets/script.js"></script>
    <script src="assets/reset.js"></script>
  </body>
</html>
