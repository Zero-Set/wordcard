<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>単語帳</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div id="setup-view">
        <h2>単語帳</h2>
        <label class="file-label">
          CSVファイルを選択
          <input
            type="file"
            id="file-input"
            accept=".csv,.txt"
            style="display: none"
          />
        </label>
        <button class="btn full btn-secondary" onclick="resetAllHistory()">
          記録をリセット
        </button>
      </div>

      <div id="study-view" class="hidden">
        <div id="live-score-container">
          <span id="current-idx">0</span>/<span id="total-count">0</span> |
          正解: <span id="live-score">0</span>
        </div>
        <div class="card" id="card">
          <div id="history-info" class="history-badge"></div>
          <div id="word-display"></div>
          <div id="instruction">タップで答えを表示</div>
        </div>
        <div id="controls" class="hidden">
          <div class="btn-group">
            <button class="btn wrong" id="btn-wrong">× 間違い</button>
            <button class="btn correct" id="btn-correct">○ 正解！</button>
          </div>
        </div>
      </div>

      <div id="result-view" class="hidden">
        <h2>結果発表</h2>
        <p class="final-score-text"><span id="final-score">0</span>%</p>
        <p id="final-stats"></p>
        <button class="btn full" onclick="location.reload()">もう一度</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
